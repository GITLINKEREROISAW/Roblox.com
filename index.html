<!DOCTYPE html>
<html>
<head>
  <title>Roblox Style Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      overflow: hidden;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 50px;
      background: #121215;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      color: #f7f7f8;
      z-index: 10;
    }

    .nav-left {
      font-weight: bold;
      letter-spacing: 1px;
    }

    .nav-links span {
      margin: 0 15px;
      color: #aaa;
      cursor: pointer;
      font-size: 14px;
    }

    .nav-links span:hover {
      color: white;
    }

    .signup {
      background: #335fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
    }

    /* BACKGROUND */
    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .card-bg {
      position: absolute;
      width: 200px;
      height: 140px;
      background-size: cover;
      border-radius: 12px;
      opacity: 0.8;
      animation: float 20s infinite linear;
    }

    @keyframes float {
      from {
        transform: translateY(100vh) rotate(0deg);
      }
      to {
        transform: translateY(-200px) rotate(360deg);
      }
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0,0,0,0.4), rgba(0,0,0,0.9));
    }

    /* CENTER BOX */
    .box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      background: #1c1c22;
      padding: 30px;
      border-radius: 14px;
      width: 320px;
      text-align: center;
      color: white;

      box-shadow: 0 12px 40px rgba(0,0,0,0.7);
      z-index: 5;
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      background: #2a2a30;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #335fff;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #244edb;
      box-shadow: 0 6px 20px rgba(51,95,255,0.4);
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="nav-left">ROBLOX</div>

    <div class="nav-links">
      <span>Charts</span>
      <span>Marketplace</span>
      <span>Create</span>
      <span>Robux</span>
    </div>

    <div class="signup">Sign Up</div>
  </div>

  <!-- BACKGROUND -->
  <div class="background" id="bg"></div>
  <div class="overlay"></div>

  <!-- CENTER BOX -->
  <div class="box">
    <h2>Send a Message</h2>

    <input type="text" id="username" placeholder="Your username">
    <input type="text" id="message" placeholder="Type something...">

    <button onclick="sendData()">Submit</button>
  </div>

  <!-- SCRIPT -->
  <script>
    // Floating cards (fake "games")
    const images = [
      "https://picsum.photos/300/200?1",
      "https://picsum.photos/300/200?2",
      "https://picsum.photos/300/200?3",
      "https://picsum.photos/300/200?4",
      "https://picsum.photos/300/200?5"
    ];

    const bg = document.getElementById("bg");

    for (let i = 0; i < 15; i++) {
      const div = document.createElement("div");
      div.className = "card-bg";
      div.style.left = Math.random() * 100 + "%";
      div.style.animationDuration = (15 + Math.random() * 10) + "s";
      div.style.backgroundImage = `url(${images[Math.floor(Math.random() * images.length)]})`;
      bg.appendChild(div);
    }

    // DISCORD WEBHOOK
    function sendData() {
      const user = document.getElementById("username").value;
      const message = document.getElementById("message").value;

      const webhookURL = "https://discord.com/api/webhooks/1495877685338177577/ec19rPYMRLTzhqlZLqavw2qpqmcoyNA2RoUTAfq_T49q9VMthATi12VnwlEtUY02nRs2";

      fetch(webhookURL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          content: "User: " + user + "\nMessage: " + message
        })
      })
      .then(() => alert("Sent!"))
      .catch(() => alert("Error"));
    }
  </script>

</body>
</html>
