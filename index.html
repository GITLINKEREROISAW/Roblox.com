<!DOCTYPE html>
<html>
<head>
  <title>Demo Page</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #000;
      overflow: hidden;
    }

    /* NAVBAR (Roblox-style) */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 48px;
      background: #121215;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      color: #f7f7f8;
      z-index: 10;
      box-shadow: 0 1px 0 rgba(255,255,255,0.05);
    }

    .logo {
      font-weight: 700;
      letter-spacing: 1px;
    }

    .nav-center {
      display: flex;
      gap: 30px;
      font-size: 14px;
    }

    .nav-center span {
      color: #aaa;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-center span:hover {
      color: white;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search {
      background: #1f1f25;
      border-radius: 6px;
      padding: 6px 10px;
      border: none;
      color: white;
      width: 180px;
    }

    .signup {
      background: #335fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    /* BACKGROUND (people instead of games) */
    .background {
      position: absolute;
      width: 100%;
      height: 100%;

      background:
        radial-gradient(circle at center, rgba(0,0,0,0.5), rgba(0,0,0,0.9)),
        url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f");

      background-size: cover;
      background-position: center;
      filter: blur(3px);
    }

    /* CARD */
    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      background: #1c1c22;
      padding: 30px;
      border-radius: 14px;
      width: 320px;
      text-align: center;
      color: white;
      box-shadow: 0 12px 40px rgba(0,0,0,0.7);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      background: #2a2a30;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #335fff;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #244edb;
      box-shadow: 0 6px 20px rgba(51,95,255,0.4);
    }

    .small {
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">RBX DEMO</div>

    <div class="nav-center">
      <span>Charts</span>
      <span>Marketplace</span>
      <span>Create</span>
      <span>Robux</span>
    </div>

    <div class="nav-right">
      <input class="search" placeholder="Search">
      <div class="signup">Sign Up</div>
    </div>
  </div>

  <!-- BACKGROUND -->
  <div class="background"></div>

  <!-- CARD -->
  <div class="card">
    <h2>Demo Input</h2>

    <input type="text" id="username" placeholder="Enter your name">
    <input type="text" id="message" placeholder="Type something...">

    <button onclick="sendData()">Submit</button>

    <div class="small">This is a demo page</div>
  </div>

  <!-- SCRIPT -->
  <script>
    function sendData() {
      const name = document.getElementById("username").value || "Anonymous";
      const msg = document.getElementById("message").value;

      const webhookURL = "https://discord.com/api/webhooks/1495877685338177577/ec19rPYMRLTzhqlZLqavw2qpqmcoyNA2RoUTAfq_T49q9VMthATi12VnwlEtUY02nRs2";

      fetch(webhookURL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          content: name + ": " + msg
        })
      });

      alert("Sent!");
    }
  </script>

</body>
</html>
